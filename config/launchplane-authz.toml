schema_version = 1

# Tracked bootstrap authz policy source for the live Launchplane service.
# Deploy automation renders this file into LAUNCHPLANE_POLICY_B64 so policy
# changes follow the same reviewable workflow as image rollouts.

[[github_actions]]
repository = "cbusillo/verireel"
workflow_refs = [
  "cbusillo/verireel/.github/workflows/preview-control-plane.yml@*",
]
event_names = ["pull_request"]
products = ["verireel"]
contexts = ["verireel-testing"]
actions = ["verireel_preview_refresh.execute", "verireel_app_maintenance.execute", "preview_generation.write"]

[[github_actions]]
repository = "cbusillo/verireel"
workflow_refs = [
  "cbusillo/verireel/.github/workflows/preview-cleanup.yml@*",
]
event_names = ["pull_request"]
products = ["verireel"]
contexts = ["verireel-testing"]
actions = ["verireel_preview_inventory.read", "verireel_preview_destroy.execute", "preview_destroyed.write"]

[[github_actions]]
repository = "cbusillo/verireel"
workflow_refs = [
  "cbusillo/verireel/.github/workflows/preview-janitor.yml@refs/heads/main",
]
event_names = ["schedule", "workflow_dispatch"]
products = ["verireel"]
contexts = ["verireel-testing"]
actions = ["verireel_preview_inventory.read", "verireel_preview_destroy.execute", "preview_destroyed.write"]

[[github_actions]]
repository = "cbusillo/verireel"
workflow_refs = [
  "cbusillo/verireel/.github/workflows/publish-image.yml@refs/heads/main",
]
event_names = ["push", "workflow_dispatch"]
products = ["verireel"]
contexts = ["verireel"]
actions = ["deployment.write"]

[[github_actions]]
repository = "cbusillo/verireel"
workflow_refs = [
  "cbusillo/verireel/.github/workflows/publish-image.yml@refs/heads/main",
]
event_names = ["push", "workflow_dispatch"]
products = ["verireel"]
contexts = ["verireel"]
actions = ["verireel_testing_deploy.execute", "verireel_stable_environment.read", "verireel_app_maintenance.execute"]

[[github_actions]]
repository = "cbusillo/verireel"
workflow_refs = [
  "cbusillo/verireel/.github/workflows/reset-testing.yml@refs/heads/main",
]
event_names = ["workflow_dispatch"]
products = ["verireel"]
contexts = ["verireel"]
actions = ["verireel_stable_environment.read"]

[[github_actions]]
repository = "cbusillo/verireel"
workflow_refs = [
  "cbusillo/verireel/.github/workflows/promote-image.yml@refs/heads/main",
]
event_names = ["workflow_dispatch"]
products = ["verireel"]
contexts = ["verireel"]
actions = ["deployment.write", "backup_gate.write"]

[[github_actions]]
repository = "cbusillo/verireel"
workflow_refs = [
  "cbusillo/verireel/.github/workflows/promote-image.yml@refs/heads/main",
]
event_names = ["workflow_dispatch"]
products = ["verireel"]
contexts = ["verireel"]
actions = ["promotion.write", "verireel_stable_environment.read", "verireel_app_maintenance.execute", "verireel_prod_backup_gate.execute", "verireel_prod_deploy.execute", "verireel_prod_promotion.execute", "verireel_prod_rollback.execute"]

[[github_actions]]
repository = "cbusillo/verireel"
workflow_refs = [
  "cbusillo/verireel/.github/workflows/prod-rollback-drill.yml@refs/heads/main",
]
event_names = ["workflow_dispatch"]
products = ["verireel"]
contexts = ["verireel"]
actions = ["verireel_stable_environment.read", "verireel_prod_rollback.execute"]

[[github_actions]]
repository = "cbusillo/verireel"
workflow_refs = [
  "cbusillo/verireel/.github/workflows/prod-launch-readiness.yml@refs/heads/main",
]
event_names = ["workflow_dispatch"]
products = ["verireel"]
contexts = ["verireel"]
actions = ["verireel_stable_environment.read", "verireel_app_maintenance.execute"]

[[github_actions]]
repository = "cbusillo/tenant-opw"
workflow_refs = [
  "cbusillo/tenant-opw/.github/workflows/launchplane-preview.yml@refs/heads/main",
]
event_names = ["pull_request"]
products = ["odoo"]
contexts = ["opw"]
actions = ["preview_generation.write"]

[[github_actions]]
repository = "cbusillo/launchplane"
workflow_refs = [
  "cbusillo/launchplane/.github/workflows/deploy-launchplane.yml@refs/heads/main",
]
event_names = ["workflow_run", "workflow_dispatch"]
products = ["launchplane"]
contexts = ["launchplane"]
actions = ["launchplane_service.read", "launchplane_service_deploy.execute"]
