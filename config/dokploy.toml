schema_version = 2

[defaults]
target_type = "compose"
source_git_ref = "origin/main"
source_type = "git"
custom_git_url = "git@github.com:cbusillo/odoo-devkit.git"
custom_git_branch = "main"
compose_path = "./docker-compose.yml"

[projects.primary]
project_name = "primary-runtime"

[profiles.odoo]
project = "primary"
healthcheck_enabled = true
healthcheck_path = "/web/health"

[profiles.odoo.env]
DOCKER_PULL_POLICY = "missing"
ENV_OVERRIDE_CONFIG_PARAM__WEB__BASE__URL_FREEZE = "True"
ODOO_WEB_COMMAND = "python3 /volumes/scripts/run_odoo_startup.py -c /tmp/platform.odoo.conf"
ODOO_ADDON_REPOSITORIES = "cbusillo/disable_odoo_online@411f6b8e85cac72dc7aa2e2dc5540001043c327d"

[profiles.cm]
extends = "odoo"

[profiles.opw]
extends = "odoo"
deploy_timeout_seconds = 7200
healthcheck_timeout_seconds = 600

[profiles.opw.env]
OPENUPGRADE_ENABLED = "True"
ODOO_ADDON_REPOSITORIES = "cbusillo/disable_odoo_online@411f6b8e85cac72dc7aa2e2dc5540001043c327d,OCA/OpenUpgrade@89e649728027a8ab656b3aa4be18f4bd364db417"
OPENUPGRADE_ADDON_REPOSITORY = "OCA/OpenUpgrade@89e649728027a8ab656b3aa4be18f4bd364db417"
OPENUPGRADELIB_INSTALL_SPEC = "git+https://github.com/OCA/openupgradelib.git@46d66ff5ed6a99481f84d3c79fc6e50835da7286"

# Stable Dokploy routes cover only the shared testing and prod lanes.
# Pull-request previews are Harbor-managed ephemeral stacks, not durable routes
# in this catalog.

[[targets]]
profile = "cm"
context = "cm"
instance = "testing"
git_branch = "cm-testing"
require_test_gate = true
require_prod_gate = false
domains = ["cm-testing.shinycomputers.com"]

[targets.env]
ENV_OVERRIDE_CONFIG_PARAM__WEB__BASE__URL = "https://cm-testing.shinycomputers.com"
ENV_OVERRIDE_AUTHENTIK__BASE_URL = "https://authentik.cellmechanic.com"
ENV_OVERRIDE_AUTHENTIK__DISABLE_PROVIDERS = "Odoo.com"
ENV_OVERRIDE_AUTHENTIK__GROUP_CLAIM = "groups"

[[targets]]
profile = "cm"
context = "cm"
instance = "prod"
git_branch = "cm-prod"
require_test_gate = false
require_prod_gate = true
domains = ["cm-prod.shinycomputers.com"]

[targets.env]
ENV_OVERRIDE_CONFIG_PARAM__WEB__BASE__URL = "https://odoo.cellmechanic.com"
ENV_OVERRIDE_AUTHENTIK__BASE_URL = "https://authentik.cellmechanic.com"
ENV_OVERRIDE_AUTHENTIK__DISABLE_PROVIDERS = "Odoo.com"
ENV_OVERRIDE_AUTHENTIK__GROUP_CLAIM = "groups"

[[targets]]
profile = "opw"
context = "opw"
instance = "testing"
git_branch = "opw-testing"
require_test_gate = true
require_prod_gate = false
domains = ["opw-testing.shinycomputers.com"]

[targets.env]
ENV_OVERRIDE_CONFIG_PARAM__WEB__BASE__URL = "https://opw-testing.shinycomputers.com"

[[targets]]
profile = "opw"
context = "opw"
instance = "prod"
git_branch = "opw-prod"
require_test_gate = false
require_prod_gate = true
domains = ["opw-prod.shinycomputers.com"]

[targets.env]
ENV_OVERRIDE_CONFIG_PARAM__WEB__BASE__URL = "https://opw-prod.shinycomputers.com"
