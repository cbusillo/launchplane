name: Deploy Launchplane

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to build when deploying a new Launchplane image.
        required: false
        type: string
      image_reference:
        description: Exact image reference to deploy instead of building a new one.
        required: false
        type: string

permissions:
  actions: read
  contents: read
  id-token: write
  packages: write

concurrency:
  group: launchplane-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main') ||
      github.event_name == 'workflow_dispatch'
    runs-on:
      - self-hosted
      - ${{ vars.LAUNCHPLANE_RUNNER_LABEL }}
    env:
      LAUNCHPLANE_DOKPLOY_TARGET_ID: ${{ vars.LAUNCHPLANE_DOKPLOY_TARGET_ID }}
      LAUNCHPLANE_DOKPLOY_TARGET_TYPE: ${{ vars.LAUNCHPLANE_DOKPLOY_TARGET_TYPE }}
      LAUNCHPLANE_DEPLOY_HEALTH_URLS: ${{ vars.LAUNCHPLANE_DEPLOY_HEALTH_URLS }}
      LAUNCHPLANE_DOKPLOY_DEPLOY_TIMEOUT_SECONDS: ${{ vars.LAUNCHPLANE_DOKPLOY_DEPLOY_TIMEOUT_SECONDS }}
      LAUNCHPLANE_DEPLOY_HEALTH_TIMEOUT_SECONDS: ${{ vars.LAUNCHPLANE_DEPLOY_HEALTH_TIMEOUT_SECONDS }}
      LAUNCHPLANE_IMAGE_REPOSITORY: ${{ vars.LAUNCHPLANE_IMAGE_REPOSITORY }}
      LAUNCHPLANE_GITHUB_CLIENT_ID: ${{ vars.LAUNCHPLANE_GITHUB_CLIENT_ID }}
      LAUNCHPLANE_PUBLIC_URL: ${{ vars.LAUNCHPLANE_PUBLIC_URL }}
      LAUNCHPLANE_COOKIE_SECURE: ${{ vars.LAUNCHPLANE_COOKIE_SECURE }}
      LAUNCHPLANE_BOOTSTRAP_ADMIN_EMAILS: ${{ vars.LAUNCHPLANE_BOOTSTRAP_ADMIN_EMAILS }}
      LAUNCHPLANE_GITHUB_CLIENT_SECRET: ${{ secrets.LAUNCHPLANE_GITHUB_CLIENT_SECRET }}
      LAUNCHPLANE_SESSION_SECRET: ${{ secrets.LAUNCHPLANE_SESSION_SECRET }}
    steps:
      - name: Resolve deploy inputs
        id: prep
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            checkout_ref="${{ github.event.workflow_run.head_sha }}"
          elif [ -n "${{ inputs.git_ref }}" ]; then
            checkout_ref="${{ inputs.git_ref }}"
          else
            checkout_ref="${{ github.sha }}"
          fi

          image_repository="${LAUNCHPLANE_IMAGE_REPOSITORY}"
          if [ -z "$image_repository" ]; then
            image_repository="ghcr.io/${GITHUB_REPOSITORY,,}"
          fi

          deploy_image_reference="${{ inputs.image_reference }}"
          if [ -n "$deploy_image_reference" ]; then
            should_build="false"
          else
            should_build="true"
          fi

          {
            echo "checkout_ref=$checkout_ref"
            echo "image_repository=$image_repository"
            echo "should_build=$should_build"
            echo "deploy_image_reference=$deploy_image_reference"
          } >> "$GITHUB_OUTPUT"

      - name: Validate deploy configuration
        shell: bash
        run: |
          set -euo pipefail
          : "${LAUNCHPLANE_DOKPLOY_TARGET_TYPE:?Missing LAUNCHPLANE_DOKPLOY_TARGET_TYPE variable}"
          : "${LAUNCHPLANE_DOKPLOY_TARGET_ID:?Missing LAUNCHPLANE_DOKPLOY_TARGET_ID variable}"
          : "${LAUNCHPLANE_DEPLOY_HEALTH_URLS:?Missing LAUNCHPLANE_DEPLOY_HEALTH_URLS variable}"

      - name: Resolve Launchplane service endpoint
        id: service
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import os
          from urllib.parse import urlsplit

          raw_urls = [value.strip() for value in os.environ["LAUNCHPLANE_DEPLOY_HEALTH_URLS"].split(",") if value.strip()]
          if not raw_urls:
              raise SystemExit("Missing Launchplane deploy health URL.")
          parsed = urlsplit(raw_urls[0])
          if not parsed.scheme or not parsed.netloc or not parsed.hostname:
              raise SystemExit(f"Could not derive Launchplane service endpoint from {raw_urls[0]!r}.")
          service_url = f"{parsed.scheme}://{parsed.netloc}"
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"service_url={service_url}\n")
              handle.write(f"service_audience={parsed.hostname}\n")
          PY

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.prep.outputs.checkout_ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python
        run: uv python install 3.13

      - name: Set up Docker Buildx
        if: steps.prep.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: steps.prep.outputs.should_build == 'true'
        shell: bash
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DEFAULT_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          registry_username="${GHCR_USERNAME:-${GITHUB_ACTOR}}"
          registry_password="${GHCR_TOKEN:-${DEFAULT_GITHUB_TOKEN}}"

          if [ -z "$registry_password" ]; then
            echo "Missing GHCR_TOKEN secret and GitHub token fallback." >&2
            exit 1
          fi

          printf '%s' "$registry_password" | docker login ghcr.io --username "$registry_username" --password-stdin

      - name: Build and push Launchplane image
        if: steps.prep.outputs.should_build == 'true'
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          tags: |
            ${{ steps.prep.outputs.image_repository }}:main
            ${{ steps.prep.outputs.image_repository }}:sha-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve image reference
        id: image
        shell: bash
        run: |
          set -euo pipefail
          image_reference="${{ steps.prep.outputs.deploy_image_reference }}"
          if [ -z "$image_reference" ]; then
            image_reference="${{ steps.prep.outputs.image_repository }}@${{ steps.build.outputs.digest }}"
          fi
          echo "image_reference=$image_reference" >> "$GITHUB_OUTPUT"

      - name: Request Launchplane self deploy
        id: self_deploy
        shell: bash
        run: |
          set -euo pipefail

          request_deploy() {
            local response_file="$1"
            local request_payload=""
            local idempotency_key=""
            local oauth_env_json=""
            local oidc_token=""

            oidc_token="$({
              curl -fsSL \
                -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
                "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${{ steps.service.outputs.service_audience }}" \
              | jq -r '.value'
            })"

            oauth_env_json="$({
              jq -n \
                --arg github_client_id "${LAUNCHPLANE_GITHUB_CLIENT_ID:-}" \
                --arg github_client_secret "${LAUNCHPLANE_GITHUB_CLIENT_SECRET:-}" \
                --arg public_url "${LAUNCHPLANE_PUBLIC_URL:-}" \
                --arg session_secret "${LAUNCHPLANE_SESSION_SECRET:-}" \
                --arg cookie_secure "${LAUNCHPLANE_COOKIE_SECURE:-}" \
                --arg bootstrap_admin_emails "${LAUNCHPLANE_BOOTSTRAP_ADMIN_EMAILS:-}" \
                '{
                  LAUNCHPLANE_GITHUB_CLIENT_ID: $github_client_id,
                  LAUNCHPLANE_GITHUB_CLIENT_SECRET: $github_client_secret,
                  LAUNCHPLANE_PUBLIC_URL: $public_url,
                  LAUNCHPLANE_SESSION_SECRET: $session_secret,
                  LAUNCHPLANE_COOKIE_SECURE: $cookie_secure,
                  LAUNCHPLANE_BOOTSTRAP_ADMIN_EMAILS: $bootstrap_admin_emails
                } | with_entries(select(.value != ""))'
            })"
            request_payload="$({
              jq -n \
                --arg target_type "$LAUNCHPLANE_DOKPLOY_TARGET_TYPE" \
                --arg target_id "$LAUNCHPLANE_DOKPLOY_TARGET_ID" \
                --arg image_reference "${{ steps.image.outputs.image_reference }}" \
                --argjson oauth_env "$oauth_env_json" \
                '{schema_version: 1, product: "launchplane", deploy: ({target_type: $target_type, target_id: $target_id, image_reference: $image_reference} + (if ($oauth_env | length) > 0 then {oauth_env: $oauth_env} else {} end))}'
            })"
            idempotency_key="launchplane-self-deploy:${{ steps.image.outputs.image_reference }}:db-authz"

            curl -sS \
              -o "$response_file" \
              -w '%{http_code}' \
              -X POST \
              -H "Authorization: Bearer ${oidc_token}" \
              -H "Content-Type: application/json" \
              -H "Idempotency-Key: ${idempotency_key}" \
              --data "$request_payload" \
              "${{ steps.service.outputs.service_url }}/v1/drivers/launchplane/self-deploy"
          }

          response_file="$(mktemp)"
          status_code="$(request_deploy "$response_file")"
          if [ "$status_code" = "200" ] || [ "$status_code" = "202" ]; then
            cat "$response_file"
            exit 0
          fi

          cat "$response_file" >&2
          echo "Launchplane self deploy request failed with HTTP ${status_code}." >&2
          exit 1

      - name: Wait for deployed Launchplane image
        shell: bash
        run: |
          set -euo pipefail

          deadline=$((SECONDS + ${LAUNCHPLANE_DOKPLOY_DEPLOY_TIMEOUT_SECONDS:-600} + ${LAUNCHPLANE_DEPLOY_HEALTH_TIMEOUT_SECONDS:-180}))
          expected_image_reference="${{ steps.image.outputs.image_reference }}"
          while [ "$SECONDS" -lt "$deadline" ]; do
            all_healthy=1
            while IFS= read -r raw_url; do
              health_url="$(printf '%s' "$raw_url" | xargs)"
              if [ -z "$health_url" ]; then
                continue
              fi
              response_body="$(curl -fsSL "$health_url" 2>/dev/null || true)"
              if [ -z "$response_body" ] || ! printf '%s' "$response_body" | jq -e '.status == "ok"' >/dev/null 2>&1; then
                all_healthy=0
                break
              fi
            done < <(printf '%s\n' "$LAUNCHPLANE_DEPLOY_HEALTH_URLS" | tr ',' '\n')

            oidc_token="$({
              curl -fsSL \
                -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
                "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${{ steps.service.outputs.service_audience }}" \
              | jq -r '.value'
            })"

            runtime_payload="$(curl -fsSL \
              -H "Authorization: Bearer ${oidc_token}" \
              "${{ steps.service.outputs.service_url }}/v1/service/runtime" 2>/dev/null || true)"
            actual_image_reference="$(printf '%s' "$runtime_payload" | jq -r '.runtime.docker_image_reference // empty' 2>/dev/null || true)"

            if [ "$all_healthy" -eq 1 ] && [ "$actual_image_reference" = "$expected_image_reference" ]; then
              exit 0
            fi
            sleep 5
          done

          echo "Timed out waiting for Launchplane image '$expected_image_reference' to become live and healthy." >&2
          exit 1

      - name: Ensure product context workflow authz grants
        shell: bash
        run: |
          set -euo pipefail

          oidc_token="$({
            curl -fsSL \
              -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
              "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${{ steps.service.outputs.service_audience }}" \
            | jq -r '.value'
          })"

          post_grant() {
            local workflow_file="$1"
            local action_name="$2"
            local source_label="$3"
            local idempotency_suffix="$4"
            local request_payload response_file status_code

            request_payload="$({
              jq -n \
                --arg workflow_ref "${GITHUB_REPOSITORY}/.github/workflows/${workflow_file}@refs/heads/main" \
                --arg action_name "$action_name" \
                --arg source_label "$source_label" \
                '{
                  schema_version: 1,
                  product: "launchplane",
                  grant: {
                    repository: env.GITHUB_REPOSITORY,
                    workflow_refs: [$workflow_ref],
                    event_names: ["workflow_dispatch"],
                    products: ["sellyouroutboard"],
                    contexts: ["launchplane"],
                    actions: [$action_name],
                    source_label: $source_label
                  }
                }'
            })"
            response_file="$(mktemp)"
            status_code="$(curl -sS \
              -o "$response_file" \
              -w '%{http_code}' \
              -X POST \
              -H "Authorization: Bearer ${oidc_token}" \
              -H 'Content-Type: application/json' \
              -H "Idempotency-Key: launchplane-authz-grant:${idempotency_suffix}:${GITHUB_SHA}" \
              --data "$request_payload" \
              "${{ steps.service.outputs.service_url }}/v1/authz-policies/github-actions/grants")"
            if [ "$status_code" = "200" ] || [ "$status_code" = "202" ]; then
              cat "$response_file"
              return 0
            fi
            cat "$response_file" >&2
            echo "Launchplane authz grant request failed with HTTP ${status_code}." >&2
            return 1
          }

          post_grant \
            product-context-cutover-audit.yml \
            product_profile.read \
            deploy:product-context-cutover-audit-grant \
            product-context-cutover-audit
          post_grant \
            product-context-cutover.yml \
            product_profile.write \
            deploy:product-context-cutover-apply-grant \
            product-context-cutover-apply
