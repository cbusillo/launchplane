name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on:
      - self-hosted
      - chris-testing
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python
        run: uv python install 3.13

      - name: Run unit tests
        run: uv run python -m unittest
